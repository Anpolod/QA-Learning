# nginx site config for qa.flow-ai.work (VPS reverse proxy).
# Source of truth — keep in sync with /etc/nginx/sites-available/qa on the VPS.
# Routes /api, /uploads, /static, /health, /openapi.json to the backend (:8000);
# everything else to the Next.js frontend (:3001).
#
# Install on the VPS:
#   sudo cp deploy/nginx/qa.flow-ai.work.conf /etc/nginx/sites-available/qa
#   sudo ln -sf /etc/nginx/sites-available/qa /etc/nginx/sites-enabled/qa
#   sudo certbot --nginx -d qa.flow-ai.work   # provisions the TLS lines below
#   sudo nginx -t && sudo systemctl reload nginx

server {
    server_name qa.flow-ai.work;

    location /api/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /uploads/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
    }
    location /static/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
    }
    location = /health { proxy_pass http://localhost:8000; }
    location = /openapi.json { proxy_pass http://localhost:8000; }

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- TLS (managed by Certbot) ---
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/qa.flow-ai.work/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/qa.flow-ai.work/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = qa.flow-ai.work) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    server_name qa.flow-ai.work;
    listen 80;
    return 404; # managed by Certbot
}
